<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firebase Login</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase compat versions -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
    <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">Sign In to Get Token</h1>
    <div class="mb-4">
      <input 
        type="email" 
        id="email" 
        placeholder="Enter email" 
        class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>
    <div class="mb-6">
      <input 
        type="password" 
        id="password" 
        placeholder="Enter password" 
        class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>
    <button 
      onclick="signIn()" 
      class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition duration-200"
    >
      Sign In
    </button>
    <p id="status" class="mt-4 text-center text-gray-600"></p>
  </div>

  <script>
    const firebaseConfig = {
  apiKey: "AIzaSyCim0B11Wlc2viDIazMGJlNmAuVpINTqX0",
  authDomain: "grocery-ordering-new.firebaseapp.com",
  projectId: "grocery-ordering-new",
  storageBucket: "grocery-ordering-new.firebasestorage.app",
  messagingSenderId: "946169738345",
  appId: "1:946169738345:web:faca7e1d3bcadd77501ef8",
  measurementId: "G-W814D30DTQ"
};

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function signIn() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const status = document.getElementById('status');

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          console.log("User UID:", userCredential.user.uid);
          return userCredential.user.getIdToken();
        })
        .then((token) => {
          status.innerText = "Signed in!";
          console.log("JWT Token:", token);
        })
        .catch((error) => {
          status.innerText = "Incorrect Credentials!";
        });
    }
  </script>
</body>
</html>
